backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home page"
        file: "src/pages/home.md"
        fields:
          - { name: "layout", label: "Layout", widget: "hidden", default: "home.njk" }
          - { name: "title", label: "Title", widget: "string" }
          - { name: "hero_heading", label: "Hero heading", widget: "string" }
          - { name: "hero_intro", label: "Hero intro", widget: "text" }
          - { name: "seo_description", label: "SEO description", widget: "text", required: false }
          - label: "Carousel slides"
            name: "slides"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "body", label: "Body", widget: "text" }
              - { name: "cta_label", label: "CTA label", widget: "string", required: false }
              - { name: "cta_url", label: "CTA URL", widget: "string", required: false }
