backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/images"
public_folder: "/assets/images"

collections:
  - name: "services"
    label: "Services"
    folder: "src/services"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Tags", name: "tags", widget: "hidden", default: "services"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "portfolio"
    label: "Portfolio"
    folder: "src/portfolio"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Tags", name: "tags", widget: "hidden", default: "portfolio"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "src/pages/home.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Hero Text", name: "hero_text", widget: "text", default: "Expert mapping and communications for a greener and more sustainable future."}
          - {label: "Hero Image 1", name: "hero_image_1", widget: "image", required: false}
          - {label: "Hero Image 2", name: "hero_image_2", widget: "image", required: false}
          - {label: "Hero Background Color", name: "hero_bg_color", widget: "color", default: "#114B5F"}
          - {label: "Layout Content (Do Not Edit)", name: "body", widget: "markdown", required: false}
